<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tip Calculator</title>
    <link rel="stylesheet" href="old_file.css">
</head>
<body>
    <div class="wrapper">
       <div class="intro-header">
         <h1>Tip Calculator</h1>
        <p>Enter your bill amount and tips Percent to calculate your total tips.</p>
       </div>
      
        <label>Bill Amount:</label>
        <input type="number" placeholder="0" id="bill-amount">

        <label>Tip Percentage:</label>
        <input type="number" placeholder="0" id="tips-percent">
        <button onclick="calculateTotal()">CALCULATE</button>

        <div class="calculate">
            <p class="diplay-total">Tips: <span id="tip-value">0</span></p>
            <p>Total Payment: <span id="total"> 0</span></p>
        </div>
    </div>

    <script src="newfile.js"></script>
</body>
</html>
