<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <h1>Temperature Converter</h1>
        
            <div class="input-group">
                <label for="celChange">Celsius: </label>
                <input type="number" class="celChange" onchange="celChange()">
            </div>
            <div class="input-group">
                <label for="farChange">Fahrenheit:</label>
                <input type="number" class="farChange" onchange="farChange()">
            </div>
            <div class="input-group">
                <label for="kelChange">Kelvin:</label>
                <input type="number" class="kelChange" onchange="kelChange()">
            </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
